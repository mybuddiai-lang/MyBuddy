version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: buddi_postgres
    environment:
      POSTGRES_USER: buddi
      POSTGRES_PASSWORD: buddi_dev_password
      POSTGRES_DB: buddi_db
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U buddi']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: buddi_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buddi_backend
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgresql://buddi:buddi_dev_password@postgres:5432/buddi_db
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: buddi_frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      - NODE_ENV=development
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
